<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monexa Pro X</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:#0f172a}
.container{max-width:560px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h1{text-align:center}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
.small-btn{background:#10b981;margin-top:5px}
.resultado{margin-top:15px;padding:15px;background:#f1f5f9;border-radius:10px}
ul{padding-left:18px}
.item{display:flex;gap:5px}
.item input{flex:1}
</style>
</head>
<body>
<div class="container">
<h1>💎 Monexa Pro X</h1>
<p style="text-align:center">Sistema financeiro inteligente avançado</p><input type="number" id="salario" placeholder="Salário">
<input type="number" id="extra" placeholder="Renda extra"><h3>Despesas</h3>
<div id="listaGastos"></div>
<button class="small-btn" onclick="addGasto()">+ Adicionar gasto</button><h3>Meta</h3>
<input type="number" id="meta" placeholder="Quanto quer juntar"><button onclick="calcular()">Analisar</button>

<div class="resultado" id="resultado"></div>
<canvas id="grafico"></canvas>
</div><script>
let chart;
let gastos=[];

function addGasto(nome='',valor=''){
  gastos.push({nome,valor});
  render();
}

function render(){
  let div=document.getElementById('listaGastos');
  div.innerHTML='';
  gastos.forEach((g,i)=>{
    div.innerHTML+=`<div class='item'>
      <input placeholder='Categoria' value='${g.nome}' onchange='gastos[${i}].nome=this.value'>
      <input type='number' placeholder='Valor' value='${g.valor}' onchange='gastos[${i}].valor=this.value'>
    </div>`;
  });
}

function v(id){return parseFloat(document.getElementById(id).value)||0}

function calcular(){
let renda=v('salario')+v('extra');
if(renda<=0){alert('Digite renda');return}

let total=0;
let labels=[];
let valores=[];

gastos.forEach(g=>{
 let val=parseFloat(g.valor)||0;
 total+=val;
 labels.push(g.nome||'Outro');
 valores.push(val);
});

let saldo=renda-total;
let guardar=saldo>0?saldo*0.3:0;
let meta=v('meta');
let meses=meta>0&&guardar>0?(meta/guardar).toFixed(1):0;

let previsao12=guardar*12;

let dicas=[];
if(total>renda){dicas.push('Você está no prejuízo');}
if(saldo<200){dicas.push('Saldo muito baixo');}
if(guardar>0){dicas.push('Você pode começar a investir');}

let html=`
<p><strong>Renda:</strong> R$ ${renda.toFixed(2)}</p>
<p><strong>Gastos:</strong> R$ ${total.toFixed(2)}</p>
<p><strong>Saldo:</strong> R$ ${saldo.toFixed(2)}</p>
<p><strong>Guardar:</strong> R$ ${guardar.toFixed(2)}</p>
<p><strong>Em 12 meses:</strong> R$ ${previsao12.toFixed(2)}</p>
${meta>0?`<p><strong>Meta:</strong> ${meses} meses</p>`:''}
<ul>${dicas.map(d=>`<li>${d}</li>`).join('')}</ul>
`;

document.getElementById('resultado').innerHTML=html;

if(chart)chart.destroy();
let ctx=document.getElementById('grafico').getContext('2d');
chart=new Chart(ctx,{type:'doughnut',data:{labels:[...labels,'Guardar'],datasets:[{data:[...valores,guardar]}]}});

localStorage.setItem('dados',JSON.stringify({renda,gastos,meta}));
}

function carregar(){
let data=JSON.parse(localStorage.getItem('dados'));
if(data){
 document.getElementById('salario').value=data.renda;
 gastos=data.gastos||[];
 document.getElementById('meta').value=data.meta;
 render();
}
}

addGasto('Moradia','');
addGasto('Alimentação','');
carregar();
</script></body>
</html>
