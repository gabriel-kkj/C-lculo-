<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monexa Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:#0f172a}
.container{max-width:550px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h1{text-align:center}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
.resultado{margin-top:15px;padding:15px;background:#f1f5f9;border-radius:10px}
ul{padding-left:18px}
</style>
</head>
<body>
<div class="container">
<h1>💎 Monexa Pro</h1>
<p style="text-align:center">Sistema financeiro inteligente</p><input type="number" id="salario" placeholder="Salário principal">
<input type="number" id="extra" placeholder="Renda extra"><h3>Despesas</h3>
<input type="number" id="moradia" placeholder="Moradia">
<input type="number" id="alimentacao" placeholder="Alimentação">
<input type="number" id="transporte" placeholder="Transporte">
<input type="number" id="lazer" placeholder="Lazer">
<input type="number" id="outros" placeholder="Outros"><h3>Meta</h3>
<input type="number" id="meta" placeholder="Quanto quer juntar (R$)"><button onclick="calcular()">Analisar</button>

<div class="resultado" id="resultado"></div>
<canvas id="grafico"></canvas>
</div><script>
let chart;
function v(id){return parseFloat(document.getElementById(id).value)||0}

function calcular(){
let salario=v('salario');
let extra=v('extra');
let renda=salario+extra;

let moradia=v('moradia');
let alimentacao=v('alimentacao');
let transporte=v('transporte');
let lazer=v('lazer');
let outros=v('outros');
let meta=v('meta');

if(renda<=0){alert('Digite sua renda');return}

let total=moradia+alimentacao+transporte+lazer+outros;
let saldo=renda-total;
let guardar = saldo>0 ? saldo*0.3 : 0;

let mesesMeta = meta>0 && guardar>0 ? (meta/guardar).toFixed(1) : 0;

let nivel='';
let dicas=[];

if(total>renda){
 nivel='🔴 Crítico';
 dicas.push('Você gasta mais do que ganha');
 dicas.push('Corte gastos urgentes');
}
else if(saldo<200){
 nivel='🟡 Atenção';
 dicas.push('Seu saldo está baixo');
 dicas.push('Reduza gastos variáveis');
}
else{
 nivel='🟢 Saudável';
 dicas.push('Boa gestão financeira');
 dicas.push('Invista e aumente patrimônio');
}

let porcentMoradia=(moradia/renda)*100;
if(porcentMoradia>40){dicas.push('Moradia está muito alta');}

let previsao6 = guardar*6;
let previsao12 = guardar*12;

let html=`
<p><strong>Renda total:</strong> R$ ${renda.toFixed(2)}</p>
<p><strong>Gastos:</strong> R$ ${total.toFixed(2)}</p>
<p><strong>Saldo:</strong> R$ ${saldo.toFixed(2)}</p>
<p><strong>Nível:</strong> ${nivel}</p>

<p><strong>Você pode guardar:</strong> R$ ${guardar.toFixed(2)}</p>
<p>Em 6 meses: R$ ${previsao6.toFixed(2)}</p>
<p>Em 12 meses: R$ ${previsao12.toFixed(2)}</p>

${meta>0 ? `<p><strong>Meta:</strong> R$ ${meta} → ${mesesMeta} meses</p>`:''}

<ul>${dicas.map(d=>`<li>${d}</li>`).join('')}</ul>
`;

document.getElementById('resultado').innerHTML=html;

if(chart)chart.destroy();
let ctx=document.getElementById('grafico').getContext('2d');
chart=new Chart(ctx,{
 type:'doughnut',
 data:{
 labels:['Moradia','Alimentação','Transporte','Lazer','Outros','Guardar'],
 datasets:[{data:[moradia,alimentacao,transporte,lazer,outros,guardar]}]
 }
});
}
</script></body>
</html>
