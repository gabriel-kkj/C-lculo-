<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monexa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:#111}
.container{max-width:520px;margin:20px auto;background:#ffffff;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h1{text-align:center;color:#0f172a}
p{text-align:center;color:#555}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#1d4ed8}
.resultado{margin-top:15px;padding:15px;background:#f1f5f9;border-radius:10px}
.dica{font-weight:bold;margin-top:10px}
ul{padding-left:18px}
.extra{margin-top:10px;font-size:14px;color:#333}
</style>
</head>
<body>
<div class="container">
<h1>💎 Monexa</h1>
<p>Seu assistente financeiro inteligente</p><input type="number" id="salario" placeholder="Seu salário (R$)"><h3>Gastos Essenciais</h3>
<input type="number" id="aluguel" placeholder="Aluguel">
<input type="number" id="agua" placeholder="Água">
<input type="number" id="energia" placeholder="Energia">
<input type="number" id="mercado" placeholder="Supermercado">
<input type="number" id="transporte" placeholder="Transporte"><h3>Outros Gastos</h3>
<input type="number" id="lazer" placeholder="Lazer">
<input type="number" id="outros" placeholder="Outros gastos"><button onclick="calcular()">Analisar Minha Vida Financeira</button>

<div class="resultado" id="resultado"></div>
<canvas id="grafico"></canvas>
</div><script>
let chart;
function v(id){return parseFloat(document.getElementById(id).value)||0}

function calcular(){
let salario=v('salario');
let aluguel=v('aluguel');
let agua=v('agua');
let energia=v('energia');
let mercado=v('mercado');
let transporte=v('transporte');
let lazer=v('lazer');
let outros=v('outros');

if(salario<=0){alert('Digite seu salário');return}

let essenciais=aluguel+agua+energia+mercado+transporte;
let variaveis=lazer+outros;
let total=essenciais+variaveis;
let saldo=salario-total;

let guardar = saldo > 0 ? saldo * 0.3 : 0;
let reservaEmergencia = salario * 6; // meta padrão (6 meses)

let dicas=[];
let nivel='';

if(total>salario){
 nivel='🔴 Crítico';
 dicas.push('Você está gastando mais do que ganha');
 dicas.push('Corte gastos variáveis imediatamente');
 dicas.push('Evite dívidas e parcelamentos');
}
else if(saldo<200){
 nivel='🟡 Atenção';
 dicas.push('Seu dinheiro está muito apertado');
 dicas.push('Revise gastos pequenos (efeito formiguinha)');
}
else{
 nivel='🟢 Saudável';
 dicas.push('Você está com controle financeiro');
 dicas.push('Comece a investir regularmente');
 dicas.push('Monte uma reserva de emergência');
}

let porcentEssenciais=(essenciais/salario)*100;
let porcentVariaveis=(variaveis/salario)*100;

if(porcentEssenciais>70){
 dicas.push('Seu custo de vida está alto (moradia, contas, etc)');
}
if(porcentVariaveis>40){
 dicas.push('Gastos variáveis elevados (lazer/compras)');
}

let html=`
<p><strong>Saldo:</strong> R$ ${saldo.toFixed(2)}</p>
<p><strong>Total gasto:</strong> R$ ${total.toFixed(2)}</p>
<p><strong>Nível:</strong> ${nivel}</p>
<p>Essenciais: ${porcentEssenciais.toFixed(1)}%</p>
<p>Variáveis: ${porcentVariaveis.toFixed(1)}%</p>
<p><strong>Valor sugerido para guardar:</strong> R$ ${guardar.toFixed(2)}</p>

<div class="extra">
<p><strong>💡 Reserva de emergência ideal:</strong> R$ ${reservaEmergencia.toFixed(2)}</p>
<p>Baseado em 6 meses do seu salário</p>
</div>

<ul>${dicas.map(d=>`<li>${d}</li>`).join('')}</ul>
`;

document.getElementById('resultado').innerHTML=html;

if(chart)chart.destroy();
let ctx=document.getElementById('grafico').getContext('2d');
chart=new Chart(ctx,{
 type:'doughnut',
 data:{
 labels:['Essenciais','Variáveis','Guardar'],
 datasets:[{data:[essenciais,variaveis,guardar]}]
 }
});
}
</script></body>
</html>
