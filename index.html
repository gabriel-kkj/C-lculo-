
<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FinSmart Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }.container {
  max-width: 450px;
  margin: 40px auto;
  background: #1e293b;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 5px;
}

p.subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 14px;
}

h4 {
  margin-top: 20px;
  margin-bottom: 5px;
  color: #38bdf8;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  background: #334155;
  color: white;
}

input::placeholder {
  color: #94a3b8;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: #0f172a;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
}

.resultado {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 10px;
}

.dica {
  margin-top: 10px;
  font-weight: bold;
}

.positivo { color: #22c55e; }
.negativo { color: #ef4444; }
.neutro { color: #facc15; }

  </style>
</head>
<body><div class="container">
  <h2>💰 FinSmart Pro+</h2>
  <p class="subtitle">Planejamento financeiro inteligente</p>  <input type="number" id="salario" placeholder="Seu salário (R$)">  <h4>💸 Gastos Essenciais</h4>
  <input type="number" id="aluguel" placeholder="Aluguel">
  <input type="number" id="agua" placeholder="Água">
  <input type="number" id="energia" placeholder="Energia">
  <input type="number" id="gas" placeholder="Gás">
  <input type="number" id="mercado" placeholder="Supermercado">
  <input type="number" id="transporte" placeholder="Transporte">  <h4>🎯 Lazer</h4>
  <input type="number" id="lazer" placeholder="Lazer"><button onclick="calcular()">Analisar Finanças</button>

  <div class="resultado" id="resultado"></div>
  <canvas id="grafico"></canvas>
</div><script>
let chart;

function pegarValor(id) {
  return parseFloat(document.getElementById(id).value) || 0;
}

function calcular() {
  let salario = pegarValor('salario');

  let aluguel = pegarValor('aluguel');
  let agua = pegarValor('agua');
  let energia = pegarValor('energia');
  let gas = pegarValor('gas');
  let mercado = pegarValor('mercado');
  let transporte = pegarValor('transporte');
  let lazer = pegarValor('lazer');

  if (salario <= 0) {
    alert('Digite seu salário!');
    return;
  }

  let essenciais = aluguel + agua + energia + gas + mercado + transporte;
  let total = essenciais + lazer;
  let saldo = salario - total;

  let limiteLazer = salario * 0.3;
  let investimento = salario * 0.2;

  let dica = '';
  let classe = 'neutro';

  if (total > salario) {
    dica = '⚠️ Você está gastando mais do que ganha.';
    classe = 'negativo';
  } else if (lazer > limiteLazer) {
    dica = '⚠️ Seus gastos com lazer estão acima do recomendado.';
    classe = 'neutro';
  } else if (saldo > 0) {
    dica = '✅ Você está conseguindo manter um bom controle financeiro.';
    classe = 'positivo';
  }

  document.getElementById('resultado').innerHTML = `
    <p><strong>Saldo:</strong> R$ ${saldo.toFixed(2)}</p>
    <p>Gastos Essenciais: R$ ${essenciais.toFixed(2)}</p>
    <p>Lazer: R$ ${lazer.toFixed(2)}</p>
    <p>Investimento sugerido: R$ ${investimento.toFixed(2)}</p>
    <p class="dica ${classe}">${dica}</p>
  `;

  if (chart) chart.destroy();

  const ctx = document.getElementById('grafico').getContext('2d');
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Essenciais', 'Lazer', 'Investimentos'],
      datasets: [{
        data: [essenciais, lazer, investimento]
      }]
    }
  });
}
</script></body>
</html>
